name: Build Ubuntu

on:
  push:
    branches: [ master ]
    paths:
      - '**.py'
      - 'requirements.txt'
      - 'build.py'
    paths-ignore:
      - 'flutter_app/**'
      - 'android/**'
      - 'tests/**'
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Version override (leave empty to use config.py)'
        required: false
        type: string

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y vlc libvlc-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Extract version
      id: version
      run: |
        if [ -n "${{ inputs.version_override }}" ]; then
          VERSION="${{ inputs.version_override }}"
        else
          VERSION=$(python -c "exec(open('config.py').read()); print(APP_VERSION)")
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        # Get OS codename
        CODENAME=$(lsb_release -cs)
        echo "codename=$CODENAME" >> $GITHUB_OUTPUT

    - name: Build executable
      run: python build.py --onefile

    - name: Rename artifact
      run: |
        mv dist/TV_Viewer "dist/TV_Viewer_v${{ steps.version.outputs.version }}_${{ steps.version.outputs.codename }}"

    - name: Verify executable
      run: |
        ls -lh dist/
        file "dist/TV_Viewer_v${{ steps.version.outputs.version }}_${{ steps.version.outputs.codename }}"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: tv-viewer-${{ steps.version.outputs.codename }}-v${{ steps.version.outputs.version }}
        path: dist/TV_Viewer_v${{ steps.version.outputs.version }}_${{ steps.version.outputs.codename }}
        retention-days: 30
        if-no-files-found: error

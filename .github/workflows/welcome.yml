# =============================================================================
# Welcome Bot — Greet first-time contributors
# =============================================================================
# Automatically thanks first-time issue creators, PR authors, and commenters
# to build a welcoming open-source community.
# =============================================================================

name: Welcome

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Welcome to TV Viewer! Thanks for opening your first issue.

            A maintainer will review this soon. In the meantime:
            - 📺 **Channel issues?** Make sure to include the channel name and URL
            - 🐛 **Bug reports?** Steps to reproduce help us fix it faster
            - 💡 **Feature ideas?** We love hearing from users!

            If you enjoy TV Viewer, consider [buying the developer a beer 🍺](https://ko-fi.com/tvviewer)
          pr-message: |
            👋 Welcome to TV Viewer! Thanks for your first pull request.

            A maintainer will review your changes soon. Please make sure:
            - ✅ Your changes follow existing code patterns
            - ✅ Tests pass (if applicable)
            - ✅ You've described what the PR does

            Thanks for contributing to open-source IPTV! 🎉

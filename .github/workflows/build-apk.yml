name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions: {}  # Deny all by default

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Java 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2  # v2
        with:
          flutter-version: '3.24.5'
          channel: stable

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is missing — release would be signed with debug key"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > flutter_app/android/app/upload-keystore.jks
          cat > flutter_app/android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF
          # Verify SHA1 fingerprint matches the expected upload key
          EXPECTED_SHA1="56:21:F2:7C:DA:DC:12:C3:22:A4:00:BD:74:28:27:97:EA:97:6B:E4"
          ACTUAL_SHA1=$(keytool -list -v -keystore flutter_app/android/app/upload-keystore.jks \
                        -alias "$KEY_ALIAS" -storepass "$KEYSTORE_PASSWORD" 2>/dev/null \
                        | grep -i "SHA1:" | head -1 | awk -F'SHA1: ' '{print $2}' | tr -d ' ')
          echo "Expected SHA1: $EXPECTED_SHA1"
          echo "Actual SHA1:   $ACTUAL_SHA1"
          if [ "$ACTUAL_SHA1" != "$EXPECTED_SHA1" ]; then
            echo "::error::Keystore SHA1 mismatch — refusing to build with wrong signing key"
            exit 1
          fi

      - name: Install dependencies
        run: cd flutter_app && flutter pub get

      - name: Build release APK
        run: cd flutter_app && flutter build apk --release

      - name: Build release App Bundle (AAB) for Play Store
        run: cd flutter_app && flutter build appbundle --release

      # --- Tag push: create a GitHub Release with the APK attached ---
      - name: Rename APK for release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          cp flutter_app/build/app/outputs/flutter-apk/app-release.apk \
             "flutter_app/build/app/outputs/flutter-apk/tv-viewer-${TAG_NAME}.apk"
          cp flutter_app/build/app/outputs/bundle/release/app-release.aab \
             "flutter_app/build/app/outputs/bundle/release/tv-viewer-${TAG_NAME}.aab"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            flutter_app/build/app/outputs/flutter-apk/tv-viewer-*.apk
            flutter_app/build/app/outputs/bundle/release/tv-viewer-*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- Manual dispatch: upload APK + AAB as workflow artifacts ---
      - name: Upload APK artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: tv-viewer-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB artifact (Play Store)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: tv-viewer-aab
          path: flutter_app/build/app/outputs/bundle/release/app-release.aab

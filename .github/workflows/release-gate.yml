name: Release Gate

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to validate (e.g., 1.9.0)'
        required: true
        type: string

permissions:
  contents: read
  issues: read

jobs:
  # Gate 1: Full test matrix
  test-gate:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        python-version: ['3.10', '3.11', '3.12']
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install system deps
      run: |
        sudo apt-get update
        sudo apt-get install -y vlc libvlc-dev
    - name: Install Python deps
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-cov
    - name: Run tests
      run: python -m pytest tests/ -v --tb=short

  # Gate 2: Security scan
  security-gate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install deps
      run: |
        pip install -r requirements.txt
        pip install bandit pip-audit
    - name: Bandit scan (HIGH blocks)
      run: |
        bandit -r core/ ui/ utils/ main.py -ll --format json -o bandit.json || true
        python3 -c "
        import json, sys
        with open('bandit.json') as f: data = json.load(f)
        high = [r for r in data.get('results',[]) if r['issue_severity']=='HIGH']
        if high:
            for h in high: print(f\"❌ {h['filename']}:{h['line_number']} - {h['issue_text']}\")
            sys.exit(1)
        print('✅ No HIGH severity issues')
        "
    - name: pip-audit
      run: pip-audit || true
    - name: shell=True check
      run: |
        if grep -rn "shell=True" core/ ui/ utils/ main.py --include="*.py"; then
          echo "❌ shell=True found"; exit 1
        fi

  # Gate 3: Code quality
  quality-gate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install tools
      run: pip install radon flake8
    - name: Flake8 (fatal errors only)
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=build,dist,flutter_app,android,archive
    - name: Radon complexity check
      run: |
        # Fail if more than 5 functions with complexity F (very high)
        COUNT=$(radon cc core/ ui/ utils/ -n F -s --exclude="build,dist" 2>/dev/null | grep -c "F " || true)
        echo "Very high complexity functions: $COUNT"
        if [ "$COUNT" -gt 5 ]; then
          echo "❌ Too many highly complex functions ($COUNT > 5)"
          radon cc core/ ui/ utils/ -n F -s --exclude="build,dist"
          exit 1
        fi

  # Gate 4: Documentation check
  docs-gate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Check required docs
      run: |
        MISSING=0
        for f in README.md CHANGELOG.md; do
          if [ ! -f "$f" ]; then
            echo "❌ Missing: $f"
            MISSING=$((MISSING + 1))
          else
            echo "✅ Found: $f"
          fi
        done
        if [ "$MISSING" -gt 0 ]; then exit 1; fi
    - name: Version in CHANGELOG
      run: |
        VERSION="${{ inputs.version || '' }}"
        if [ -z "$VERSION" ] && [[ "$GITHUB_REF" == refs/tags/v* ]]; then
          VERSION="${GITHUB_REF#refs/tags/v}"
        fi
        if [ -n "$VERSION" ]; then
          if grep -q "\[$VERSION\]" CHANGELOG.md; then
            echo "✅ Version $VERSION found in CHANGELOG.md"
          else
            echo "❌ Version $VERSION not found in CHANGELOG.md"
            exit 1
          fi
        fi

  # Gate 5: Build verification (all 3 platforms)
  build-gate-ubuntu:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install deps
      run: |
        sudo apt-get update && sudo apt-get install -y vlc libvlc-dev
        pip install -r requirements.txt
        pip install pyinstaller
    - name: Build
      run: python build.py --onefile
    - name: Verify
      run: |
        test -f dist/TV_Viewer && echo "✅ Ubuntu build OK" || (echo "❌ Ubuntu build failed"; exit 1)

  build-gate-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install deps
      run: |
        pip install -r requirements.txt
        pip install pyinstaller
    - name: Build
      run: python build.py --onefile
    - name: Verify
      shell: bash
      run: |
        test -f dist/TV_Viewer.exe && echo "✅ Windows build OK" || (echo "❌ Windows build failed"; exit 1)

  build-gate-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
    - name: Build APK
      run: |
        flutter pub get
        flutter build apk --release
    - name: Verify
      run: |
        test -f build/app/outputs/flutter-apk/app-release.apk && echo "✅ Android build OK" || (echo "❌ Android build failed"; exit 1)

  # Final: Aggregate all gates
  release-approval:
    needs: [test-gate, security-gate, quality-gate, docs-gate, build-gate-ubuntu, build-gate-windows, build-gate-android]
    runs-on: ubuntu-latest
    steps:
    - name: All gates passed
      run: |
        echo "============================================"
        echo "🎉 ALL RELEASE GATES PASSED"
        echo "============================================"
        echo ""
        echo "✅ Test Gate:     PASSED (6 matrix combinations)"
        echo "✅ Security Gate: PASSED (bandit + pip-audit + secrets)"
        echo "✅ Quality Gate:  PASSED (complexity + lint)"
        echo "✅ Docs Gate:     PASSED (CHANGELOG + README)"
        echo "✅ Build Gate:    PASSED (Ubuntu + Windows + Android)"
        echo ""
        echo "Release is approved for publication."

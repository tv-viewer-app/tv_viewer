name: Tests

on:
  push:
    branches: [ master ]
    paths-ignore:
      - 'flutter_app/**'
      - 'android/**'
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - 'flutter_app/**'
      - 'android/**'
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y vlc libvlc-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8 bandit

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics

    - name: Run tests with coverage
      run: |
        python -m pytest tests/ -v --tb=short --cov=core --cov=ui --cov=utils --cov-report=xml --cov-report=term-missing || true

    - name: Run build validation
      run: python tests/validate_build.py --quick || true

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
        path: coverage.xml
        retention-days: 14
        if-no-files-found: ignore

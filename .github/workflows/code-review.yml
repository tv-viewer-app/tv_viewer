name: Code Review

on:
  pull_request:
    branches: [ master ]
    paths:
      - '**.py'
  workflow_dispatch:

jobs:
  lint-and-complexity:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pylint radon

    - name: Flake8 analysis
      run: |
        echo "## Flake8 Results" >> $GITHUB_STEP_SUMMARY
        flake8 . --max-line-length=120 --max-complexity=15 \
          --exclude=build,dist,flutter_app,android,.git,__pycache__,archive \
          --format=default --output-file=flake8-report.txt || true
        cat flake8-report.txt >> $GITHUB_STEP_SUMMARY
        cat flake8-report.txt

    - name: Radon complexity analysis
      run: |
        echo "## Complexity Analysis" >> $GITHUB_STEP_SUMMARY
        echo "### Cyclomatic Complexity (C+ = needs attention)" >> $GITHUB_STEP_SUMMARY
        radon cc core/ ui/ utils/ -s -n C --exclude="build,dist,flutter_app" >> $GITHUB_STEP_SUMMARY || true
        radon cc core/ ui/ utils/ -s -n C --exclude="build,dist,flutter_app" || true
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Maintainability Index" >> $GITHUB_STEP_SUMMARY
        radon mi core/ ui/ utils/ -s --exclude="build,dist,flutter_app" >> $GITHUB_STEP_SUMMARY || true

    - name: Threading safety check (TV Viewer specific)
      run: |
        echo "## Threading Safety Check" >> $GITHUB_STEP_SUMMARY
        echo "Checking for direct tkinter UI updates from background threads..." >> $GITHUB_STEP_SUMMARY
        # Flag patterns that might indicate unsafe thread access
        UNSAFE=$(grep -rn "\.configure\|\.pack\|\.grid\|\.place\|\.insert\|\.delete" \
          core/ utils/ \
          --include="*.py" \
          --exclude-dir=__pycache__ || true)
        if [ -n "$UNSAFE" ]; then
          echo "⚠️ Potential unsafe UI access from non-UI modules:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$UNSAFE" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$UNSAFE"
        else
          echo "✅ No unsafe UI access patterns detected in core/utils modules" >> $GITHUB_STEP_SUMMARY
        fi

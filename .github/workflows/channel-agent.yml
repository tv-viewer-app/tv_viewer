name: 🤖 Channel Agent

on:
  issues:
    types: [opened, labeled]

concurrency:
  group: channel-agent-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  process-channel-request:
    if: contains(github.event.issue.labels.*.name, 'channel-request')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract issue body
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = context.payload.issue.body || '';
            fs.writeFileSync('/tmp/issue_body.md', body);

      - name: Run Channel Agent
        id: agent
        run: |
          python scripts/find_channels.py \
            --issue-body /tmp/issue_body.md \
            --config channels_config.json \
            --output-dir /tmp/channel-results/

          # Check if new channels were found
          if [ -f /tmp/channel-results/channel_results.json ]; then
            NEW_COUNT=$(python -c "import json; d=json.load(open('/tmp/channel-results/channel_results.json')); print(len([c for c in d.get('found',[]) if not c.get('already_exists')]))")
            echo "new_count=$NEW_COUNT" >> $GITHUB_OUTPUT
          else
            echo "new_count=0" >> $GITHUB_OUTPUT
          fi

      - name: Comment on issue with results
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const commentPath = '/tmp/channel-results/channel_comment.md';
            if (fs.existsSync(commentPath)) {
              const body = fs.readFileSync(commentPath, 'utf8');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

      - name: Create PR with new channels
        if: steps.agent.outputs.new_count > 0
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultsPath = '/tmp/channel-results/channel_results.json';
            if (!fs.existsSync(resultsPath)) return;

            const results = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
            const newChannels = results.found.filter(c => !c.already_exists && c.healthy && (c.security_ok !== false));
            if (newChannels.length === 0) return;

            // Read current config
            const configPath = 'channels_config.json';
            const config = JSON.parse(fs.readFileSync(configPath, 'utf8'));

            // Add new channels to custom_channels
            for (const ch of newChannels) {
              config.custom_channels.push({
                name: ch.name,
                url: ch.url,
                category: ch.category || 'General',
                country: ch.country || results.request.country.toUpperCase(),
                language: ch.language || '',
                min_age: 0
              });
            }

            // Write updated config
            const updatedConfig = JSON.stringify(config, null, 2) + '\n';
            fs.writeFileSync(configPath, updatedConfig);

            // Create branch and PR
            const { execSync } = require('child_process');
            const issueNum = context.issue.number;
            const branch = `channel-request/${issueNum}`;

            execSync(`git config user.name "TV Viewer Bot"`);
            execSync(`git config user.email "noreply@tv-viewer-app.github.io"`);
            execSync(`git checkout -b ${branch}`);
            execSync(`git add channels_config.json`);
            execSync(`git commit -m "feat: add ${newChannels.length} channels from request #${issueNum}\n\nChannels added:\n${newChannels.map(c => '- ' + c.name).join('\n')}\n\nCloses #${issueNum}"`);
            execSync(`git push origin ${branch}`);

            // Create PR
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📺 Add ${newChannels.length} channels (request #${issueNum})`,
              body: `## Channel Request #${issueNum}\n\nAdds ${newChannels.length} new channels requested by @${context.payload.issue.user.login}.\n\n### Channels\n${newChannels.map(c => `- **${c.name}** (${c.country}) — ${c.category}`).join('\n')}\n\n---\n*Auto-generated by the Channel Agent bot.*\nCloses #${issueNum}`,
              head: branch,
              base: 'master'
            });

            // Comment on issue about the PR
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🎉 Pull request created: #${pr.data.number}\n\nThe new channels will be available in the next release after the PR is merged.`
            });

            // Add label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['agent-processed']
            });

      - name: Label as needs-help if no channels found
        if: steps.agent.outputs.new_count == 0
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['help wanted']
            });

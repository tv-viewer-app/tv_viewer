name: Build Release

on:
  workflow_run:
    workflows: ["Release Gate"]
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.9.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # Only proceed if release gate passed (or manual dispatch)
  check-gate:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
    - uses: actions/checkout@v4
    - name: Determine version
      id: version
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
        else
          VERSION=$(python3 -c "exec(open('config.py').read()); print(APP_VERSION)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        fi

  build-ubuntu:
    needs: check-gate
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install deps
      run: |
        sudo apt-get update && sudo apt-get install -y vlc libvlc-dev
        pip install -r requirements.txt pyinstaller
    - name: Build
      run: python build.py --onefile
    - name: Get codename
      id: os_info
      run: echo "codename=$(lsb_release -cs)" >> $GITHUB_OUTPUT
    - name: Rename
      run: mv dist/TV_Viewer "dist/TV_Viewer_v${{ needs.check-gate.outputs.version }}_${{ steps.os_info.outputs.codename }}"
    - uses: actions/upload-artifact@v4
      with:
        name: ubuntu-${{ steps.os_info.outputs.codename }}
        path: dist/TV_Viewer_v*

  build-windows:
    needs: check-gate
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install deps
      run: pip install -r requirements.txt pyinstaller
    - name: Build
      run: python build.py --onefile
    - name: Rename
      shell: bash
      run: mv "dist/TV_Viewer.exe" "dist/TV_Viewer_v${{ needs.check-gate.outputs.version }}.exe"
    - uses: actions/upload-artifact@v4
      with:
        name: windows-exe
        path: dist/TV_Viewer_v*.exe

  build-android:
    needs: check-gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
    - name: Build APK
      run: |
        flutter pub get
        flutter build apk --release
    - name: Get version
      id: flutter_ver
      run: |
        VER=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
        echo "version=$VER" >> $GITHUB_OUTPUT
    - name: Copy APK
      run: |
        mkdir -p ../dist/android
        cp build/app/outputs/flutter-apk/app-release.apk "../dist/android/TV_Viewer_v${{ steps.flutter_ver.outputs.version }}.apk"
    - uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: flutter_app/../dist/android/TV_Viewer_v*.apk

  create-release:
    needs: [check-gate, build-ubuntu, build-windows, build-android]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-assets

    - name: List release assets
      run: find release-assets -type f | sort

    - name: Extract changelog
      id: changelog
      run: |
        VERSION="${{ needs.check-gate.outputs.version }}"
        # Extract section between version headers
        sed -n "/## \[${VERSION}\]/,/## \[/p" CHANGELOG.md | head -n -1 > release_notes.md || true
        if [ ! -s release_notes.md ]; then
          echo "## TV Viewer v${VERSION}" > release_notes.md
          echo "" >> release_notes.md
          echo "Release artifacts for all platforms." >> release_notes.md
        fi
        cat release_notes.md

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ needs.check-gate.outputs.version }}
        name: TV Viewer v${{ needs.check-gate.outputs.version }}
        body_path: release_notes.md
        draft: false
        prerelease: ${{ inputs.prerelease || false }}
        files: |
          release-assets/**/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: 📊 Supabase Analytics Report

on:
  workflow_dispatch:
    inputs:
      min_version:
        description: 'Minimum app version to include (e.g., 2.6.0)'
        required: false
        default: '2.6.0'
      days:
        description: 'Number of days to look back'
        required: false
        default: '30'

permissions:
  contents: read

jobs:
  analytics:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Validate inputs
        env:
          MIN_VERSION: ${{ inputs.min_version }}
          DAYS_BACK: ${{ inputs.days }}
        run: |
          if [[ ! "$MIN_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid min_version format: $MIN_VERSION"
            exit 1
          fi
          if [[ ! "$DAYS_BACK" =~ ^[0-9]+$ ]] || [ "$DAYS_BACK" -gt 365 ]; then
            echo "❌ Invalid days value: $DAYS_BACK (must be 1-365)"
            exit 1
          fi

      - name: Run analytics query
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          MIN_VERSION: ${{ inputs.min_version }}
          DAYS_BACK: ${{ inputs.days }}
        run: python scripts/supabase_analytics_report.py

      - name: Upload report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: analytics-report-${{ github.run_number }}
          path: /tmp/analytics-report.json
          retention-days: 90

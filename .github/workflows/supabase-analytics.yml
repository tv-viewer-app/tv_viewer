name: 📊 Supabase Analytics Report

on:
  workflow_dispatch:
    inputs:
      min_version:
        description: 'Minimum app version to include (e.g., 2.6.0)'
        required: false
        default: '2.6.0'
      days:
        description: 'Number of days to look back'
        required: false
        default: '30'

permissions:
  contents: read

jobs:
  analytics:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run analytics query
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          MIN_VERSION: ${{ inputs.min_version }}
          DAYS_BACK: ${{ inputs.days }}
        run: python scripts/supabase_analytics_report.py

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: analytics-report-${{ github.run_number }}
          path: /tmp/analytics-report.json
          retention-days: 90

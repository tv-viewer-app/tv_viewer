name: 🐛 Bug Report
description: Report a bug or crash in TV Viewer
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the form below so we can reproduce and fix it.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows (Desktop)
        - Linux (Desktop)
        - Android
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App Version
      description: "Check Settings → About or the title bar"
      placeholder: "e.g. 2.6.1"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
      placeholder: "Describe what you saw..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      value: |
        1. Open the app
        2. Go to '...'
        3. Click on '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - App crashes / won't start
        - Feature completely broken
        - Feature partially broken
        - Minor annoyance / cosmetic
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error logs / screenshots
      description: "Paste error messages or attach screenshots. Desktop logs: Settings → Open Log File"
    validations:
      required: false

  - type: input
    id: device
    attributes:
      label: Device info (Android only)
      placeholder: "e.g. Samsung Galaxy S24, Android 14"
    validations:
      required: false

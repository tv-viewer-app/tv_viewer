name: 📺 Channel Issue
description: Report a broken, missing, or mislabeled channel
title: "[Channel] "
labels: ["channel-issue"]
body:
  - type: dropdown
    id: issue_type
    attributes:
      label: Issue type
      options:
        - Channel not playing / buffering forever
        - Channel shows wrong content
        - Channel name or category is wrong
        - Channel has wrong country assigned
        - Channel missing from the list
        - Channel should be removed
    validations:
      required: true

  - type: input
    id: channel_name
    attributes:
      label: Channel name
      placeholder: "e.g. Channel 12 News"
    validations:
      required: true

  - type: input
    id: country
    attributes:
      label: Country / Region
      placeholder: "e.g. Israel, US, UK"
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Additional details
      description: |
        For broken channels: When did it stop working? Any error messages?
        For wrong info: What's the correct country, category, or name?
      placeholder: |
        e.g. This channel is listed as Israeli but it's actually from the US.
        Correct country: United States
        Correct category: Entertainment
    validations:
      required: false

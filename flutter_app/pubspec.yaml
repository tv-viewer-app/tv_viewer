name: tv_viewer
description: TV Viewer - IPTV Streaming App for Android
publish_to: 'none'
version: 1.4.4+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  
  # HTTP & Networking
  http: ^1.2.0
  dio: ^5.4.0
  
  # Video Player
  video_player: ^2.8.2
  chewie: ^1.7.4
  
  # State Management
  provider: ^6.1.1
  
  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  
  # Utils
  url_launcher: ^6.2.4
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/

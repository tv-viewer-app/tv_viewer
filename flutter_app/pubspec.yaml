name: tv_viewer
description: TV Viewer - IPTV Streaming App for Android
publish_to: 'none'
version: 2.9.2+43

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  
  # HTTP & Networking
  http: ^1.2.0
  
  # Video Player - use basic video_player, skip chewie
  video_player: ^2.8.2
  
  # State Management
  provider: ^6.1.1
  
  # Dependency Injection
  get_it: ^7.6.4
  
  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  
  # Utils
  url_launcher: ^6.2.4
  intl: ^0.19.0
  
  # Cryptography (SHA-256 hashing for analytics & shared DB)
  crypto: ^3.0.3
  
  # Android-specific features
  wakelock_plus: ^1.2.0
  floating: ^2.0.0
  
  # Cached images for channel logos (#147)
  cached_network_image: ^3.3.1
  
  # Device & Connectivity Info (BL-024, BL-032)
  device_info_plus: ^10.1.0
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.0
  
  # Share functionality (BL-024)
  share_plus: ^9.0.0
  
  # World Map
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

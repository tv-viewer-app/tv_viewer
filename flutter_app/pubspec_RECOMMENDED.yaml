name: tv_viewer
description: TV Viewer - IPTV Streaming App for Android
publish_to: 'none'
version: 1.5.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  
  # HTTP & Networking
  http: ^1.2.0
  
  # Video Player
  video_player: ^2.8.2
  wakelock_plus: ^1.1.4  # Keep screen on during playback
  
  # State Management
  provider: ^6.1.1
  
  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  
  # Utils
  url_launcher: ^6.2.4
  
  # Android-specific
  android_intent_plus: ^4.0.3  # For external player intents
  
  # Image caching
  cached_network_image: ^3.3.1
  
  # Network monitoring
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  
  # Testing
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
